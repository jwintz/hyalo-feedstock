    LIBGNUTLS_CFLAGS="-I$IOS_DEVICE_PREFIX/include" \
    LIBGNUTLS_LIBS="-L$IOS_DEVICE_PREFIX/lib -lgnutls -lhogweed -lnettle -lgmp -ltasn1" \
    LIBXML2_CFLAGS="-I$IOS_DEVICE_PREFIX/include/libxml2" \
    LIBXML2_LIBS="-L$IOS_DEVICE_PREFIX/lib -lxml2" \
    JANSSON_CFLAGS="-I$IOS_DEVICE_PREFIX/include" \
