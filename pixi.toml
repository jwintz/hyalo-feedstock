./configure \
    --host=aarch64-apple-darwin \
    --build=$(./build-aux/config.guess) \
    --with-pdump \
    --with-ios \
    --without-x \
    --without-ns \
    --without-dbus \
    --without-gconf \
    --without-gsettings \
    --without-selinux \
    --without-compress-install \
    --without-native-compilation \
    --without-lcms2 \
    --with-gnutls \
    --with-xml2 \
    --with-json \
    --with-modules \
    --enable-check-lisp-object-type \
    CANNOT_DUMP=yes \
    CC="$CC" \
