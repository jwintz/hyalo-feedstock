echo 'iOS Device patches applied successfully.'
""", depends-on = ["ios_device_prep"], outputs = [".patched-ios"], description = "Apply iOS patches to Device build directory" }

# Configure Emacs for iOS Device
ios_device_configure = { cwd = "emacs-build-ios-device", cmd = """
bash -c '
export SDKPATH=$(xcrun --sdk iphoneos --show-sdk-path)
export DEVELOPER_DIR=$(xcode-select -p)
export TOOLCHAIN="${DEVELOPER_DIR}/Toolchains/XcodeDefault.xctoolchain"
export IOS_MIN_VERSION=17.0
