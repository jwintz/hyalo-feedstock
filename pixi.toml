# Build libemacs.a for iOS Device
ios_device_build_libemacs = { cwd = "emacs-build-ios-device/src", cmd = """
bash -c '
set -e
export DEVELOPER_DIR=$(xcode-select -p)
export TOOLCHAIN="${DEVELOPER_DIR}/Toolchains/XcodeDefault.xctoolchain"
export AR="${TOOLCHAIN}/usr/bin/ar"

echo "=== Creating libemacs.a for iOS Device ==="
